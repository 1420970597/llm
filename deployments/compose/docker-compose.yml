services:
  web-user:
    build:
      context: ../..
      dockerfile: deployments/docker/web-user.Dockerfile
    ports:
      - "3210:80"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/api.Dockerfile
    environment:
      APP_ENV: development
      APP_ALLOWED_ORIGIN: "*"
      APP_ENCRYPTION_KEY: phase1-dev-only-32-byte-secret!!!
      API_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: llm_factory
      POSTGRES_USER: llm_factory
      POSTGRES_PASSWORD: llm_factory_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      WORKER_QUEUE_NAME: dataset-generation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: deployments/docker/worker.Dockerfile
    environment:
      APP_ENV: development
      APP_ENCRYPTION_KEY: phase1-dev-only-32-byte-secret!!!
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: llm_factory
      POSTGRES_USER: llm_factory
      POSTGRES_PASSWORD: llm_factory_dev
      WORKER_PORT: 8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_QUEUE_NAME: dataset-generation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: llm_factory
      POSTGRES_USER: llm_factory
      POSTGRES_PASSWORD: llm_factory_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_factory -d llm_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
